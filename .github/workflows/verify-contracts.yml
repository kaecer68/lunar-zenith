name: Verify Contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup contracts
        run: |
          git config --global url."https://x-access-token:${{ secrets.DESTINY_CONTRACTS_TOKEN }}@github.com".insteadOf "https://github.com/kaecer68"
          git clone --depth 1 https://github.com/kaecer68/destiny-contracts.git ../destiny-contracts

      - name: Verify contract sync
        run: |
          chmod +x scripts/sync-contracts.sh
          make verify-contracts
