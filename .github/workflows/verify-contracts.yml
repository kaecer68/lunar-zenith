name: Verify Contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup contracts
        uses: actions/checkout@v5
        with:
          repository: kaecer68/destiny-contracts
          token: ${{ secrets.DESTINY_CONTRACTS_TOKEN }}
          path: destiny-contracts
          persist-credentials: false

      - name: Verify contract sync
        run: |
          chmod +x scripts/sync-contracts.sh
          CONTRACT_PORTS_FILE="$GITHUB_WORKSPACE/destiny-contracts/runtime/ports.env" make verify-contracts
